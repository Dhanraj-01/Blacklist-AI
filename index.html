<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blacklist AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎬 1. प्रीमियम सिनेमैटिक स्प्लैश स्क्रीन -->
    <div id="splashScreen" class="splash-screen">
        <div class="full-screen-glow"></div>
        <div class="logo-wrapper">
            <img class="logo-img" src="00a79517-57cc-455d-b464-052ae1129328.jpg" alt="App Logo">
        </div>
        <div class="brand-name">Blacklist AI</div>
        <div class="owner-credit">Created, Designed & Developed by Dhanraj Singh</div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- 📱 2. मुख्य ऐप इंटरफेस -->
    <div id="appContainer" class="app-container" style="display: none;">
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">+ New Chat</button>
                <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
            </div>
            
            <button class="theme-toggle-btn" onclick="toggleDarkMode()">🌓 Toggle Dark Mode</button>
            
            <div class="history-title">Recent Chats</div>
            <div id="chatHistoryList" class="history-list"></div>
            
            <div class="sidebar-version">Blacklist AI v5.0</div>
        </div>
        <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <div class="chat-container">
            <div class="chat-header">
                <button class="menu-btn-left" onclick="toggleSidebar()">☰</button>
                <div class="header-title">Blacklist AI</div>
                <div class="header-menu-right" onclick="toggleRightMenu()">&#8942;</div>
                
                <div id="dropdownMenuRight" class="dropdown-content-right">
                    <a href="#" onclick="clearCurrentChat()">🧹 Clear Chat</a>
                    <a href="#" onclick="sendFeedback()">📩 Feedback</a>
                    <a href="#" onclick="alert('Blacklist AI v5.0 - Ultimate Smart Update')">ℹ️ About</a>
                </div>
            </div>

            <div id="welcomeScreen" class="welcome-screen">
                <h1 class="greeting-text">How can I help you today?</h1>
                <p class="sub-text">Ask Blacklist AI anything or try the examples below.</p>
                
                <div class="ai-info-tabs">
                    <span class="info-tab cap">⚡ Fast Response</span>
                    <span class="info-tab lim">⚠️ Light Database</span>
                </div>

                <div class="suggestions-grid" id="suggestionsGrid"></div>
            </div>

            <div class="chat-box" id="chatBox"></div>

            <div class="input-container">
                <div id="snapAvatar" class="snap-avatar-bubble" style="display: none;">
                    <div class="gemini-sparkle">✦</div>
                    <div class="snap-typing-dots"><span></span><span></span><span></span></div>
                </div>

                <div id="voiceWaveform" class="voice-wave-container" style="display: none;">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                    <span class="wave-text">Listening...</span>
                </div>

                <div class="input-wrapper">
                    <button id="voiceBtn" onclick="startVoiceRecognition()">🎤</button>
                    <input type="text" id="userInput" placeholder="Ask Blacklist AI..." oninput="handleTypingAvatar()">
                    <button id="sendBtn">
                        <svg viewBox="0 0 24 24">
                            <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <img class="modal-content" id="modalTargetImg" alt="Full Screen View">
    </div>

    <script src="script.js"></script>
</body>
</html>
    </div>

    <script src="script.js"></script>
</body>
</html>
