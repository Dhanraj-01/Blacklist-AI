<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Blacklist AI </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div id="welcomeScreen" class="welcome-screen">
            <h1 class="greeting-text">How can I help you today?</h1>
            <p class="sub-text">Ask Blacklist AI anything or try the examples below.</p>
            
            <div class="suggestions-grid">
                <div class="card" onclick="useSuggestion('Hi')">
                    <h4>Say Hello</h4>
                    <p>Start a conversation with AI</p>
                </div>
                <div class="card" onclick="useSuggestion('What is AI')">
                    <h4>Artificial Inteligence</h4>
                    <p>What is AI ?</p>
                </div>
            </div>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ask Dhanraj AI anything...">
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
